spring:
  application:
    name: knowledgeos
  datasource:
    url: jdbc:postgresql://localhost:5432/knowledgeos
    username: knowledgeos
    password: knowledgeos
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.knowledgeos: INFO
    org.springframework.web: INFO

knowledgeos:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen2.5:7b  }
      enabled: ${OLLAMA_ENABLED:true}
      timeout-seconds: ${OLLAMA_TIMEOUT_SECONDS:120}
  default-user-id: 1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
