spring:
  application:
    name: knowledgeos
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:h2:file:./db/knowledgeos;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.knowledgeos: INFO
    org.springframework.web: INFO

knowledgeos:
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://integrate.api.nvidia.com/v1}
      model: ${OPENAI_MODEL:z-ai/glm-5.1}
      api-key: ${OPENAI_API_KEY:}
      enabled: ${OPENAI_ENABLED:true}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}
  default-user-id: 1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
